name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: lint, type-check, security, test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Vendor OPA CLI (test-only Rego validation)
        run: |
          mkdir -p .bin
          if [ ! -x .bin/opa ]; then
            curl -sSfL -o .bin/opa \
              https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x .bin/opa
          fi
          echo "$GITHUB_WORKSPACE/.bin" >> "$GITHUB_PATH"

      - name: Verify OPA CLI is on PATH
        run: opa version

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: mypy
        run: mypy core-side-patch

      - name: Bandit security scan
        run: bandit -r core-side-patch

      - name: pip-audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: pytest with coverage
        run: pytest tests/ --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
